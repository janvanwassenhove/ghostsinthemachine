name: Release

# Every push to main cuts a patch release: the workflow bumps package.json,
# tags it, builds the Windows + macOS installers and publishes a GitHub Release
# with screenshots and an auto-generated changelog.
#
# Use the manual "Run workflow" button for a minor/major bump instead.
#
# Loop safety: the version-bump commit is pushed with the default GITHUB_TOKEN,
# and GitHub deliberately does NOT trigger workflows from GITHUB_TOKEN pushes, so
# it cannot re-trigger this workflow. The commit also carries [skip ci] and the
# `chore(release):` guard below, in case a PAT is ever wired up here.
#
# This never touches GitHub Pages — deploy.yml runs on pushes to main too, but
# the bump commit's [skip ci] keeps it from redeploying for the version bump.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false # never abandon a half-published release

jobs:
  # -------------------------------------------- test, bump the version, tag it
  prepare:
    name: Test, bump & tag
    runs-on: ubuntu-latest
    # Skip the bump commit itself, and let a human opt out with [skip release].
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!startsWith(github.event.head_commit.message, 'chore(release):') &&
       !contains(github.event.head_commit.message, '[skip release]'))
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # release the current tip of main, not a stale SHA
          fetch-depth: 0 # full history for the changelog
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1 # tests don't need the Electron binary
      - run: npm test

      - name: Bump, commit and tag
        id: bump
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          LEVEL='${{ github.event.inputs.bump || 'patch' }}'
          # npm version updates package.json + lockfile, commits and tags v<x>.
          # tail -n1 guards against npm printing notices before the version line.
          TAG="$(npm version "$LEVEL" -m 'chore(release): %s [skip ci]' | tail -n1)"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git push --follow-tags origin HEAD:main

  # ------------------------------------------------------------- screenshots
  screenshots:
    name: Capture screenshots
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - run: npx playwright install --with-deps chromium
      - run: npm run screenshots
      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: error

  # ------------------------------------------------------------- installers
  # Each runner only BUILDS (electron-builder --publish never) and uploads its
  # installers + the update feed (latest.yml / latest-mac.yml) as an artifact.
  # A single publish job assembles them, so the two runners never touch the
  # GitHub release concurrently. electron-builder still bakes app-update.yml
  # into the app from electron-builder.yml's publish config, so auto-update
  # works once the feed files are attached to the release below.
  build:
    name: Build ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
            artifact: installers-windows
          - os: macos-latest
            args: --mac
            artifact: installers-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build

      # Windows-only, and only when a cert is actually configured. CSC_LINK must
      # never be set to an empty string: electron-builder would treat "" as a
      # cert *file path*, resolve it to the project root and die with
      # "<projectDir> not a file" — which is exactly what broke the mac build.
      - name: Configure Windows code signing
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.WINDOWS_CERT_BASE64 }}" ]; then
            echo "CSC_LINK=${{ secrets.WINDOWS_CERT_BASE64 }}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CERT_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Package installers
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # Don't hunt the runner keychain for a Developer ID; with no CSC_LINK
          # this leaves electron-builder to ad-hoc sign the mac app (which arm64
          # needs to launch). Signing macOS properly is a separate step (README).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  # ------------------------------------------------------------ release notes
  publish:
    name: Compose notes & publish
    needs: [prepare, screenshots, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0 # full history so we can diff against the last tag

      # Pull every artifact (screenshots + both platforms' installers) into ./artifacts/*.
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compose release notes
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DL="https://github.com/$REPO/releases/download/$TAG"

          # Commits since the previous tag (or the whole history for the first release).
          PREV="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo '')"
          if [ -n "$PREV" ]; then RANGE="$PREV..$TAG"; else RANGE="$TAG"; fi

          {
            echo "**Ghosts in the Machine $TAG** — a haunted IT management sim. Run a paranormal IT"
            echo "support company: build rooms, hire staff of questionable qualification, and route an"
            echo "endless queue of absurd tickets while juggling money, client trust, technical debt"
            echo "and the coffee supply."
            echo
            echo "▶ **Play in your browser:** https://janvanwassenhove.github.io/ghostsinthemachine/"
            echo
            echo "## Download"
            echo
            echo "| Platform | Installer |"
            echo "| --- | --- |"
            echo "| Windows (x64) | [\`GhostsInTheMachine-$VERSION-win-x64.exe\`]($DL/GhostsInTheMachine-$VERSION-win-x64.exe) |"
            echo "| macOS (Apple Silicon) | [\`GhostsInTheMachine-$VERSION-mac-arm64.dmg\`]($DL/GhostsInTheMachine-$VERSION-mac-arm64.dmg) |"
            echo "| macOS (Intel) | [\`GhostsInTheMachine-$VERSION-mac-x64.dmg\`]($DL/GhostsInTheMachine-$VERSION-mac-x64.dmg) |"
            echo
            echo "The Windows build **updates itself**: if an older version is installed it downloads the"
            echo "new one in the background and applies it on quit."
            echo
            echo "> **macOS is unsigned.** On first launch, right-click the app → *Open* to get past"
            echo "> Gatekeeper. macOS auto-update is disabled until the app is signed and notarized."
            echo
            echo "## Screenshots"
            echo
            echo "| Main menu | Campaign |"
            echo "| --- | --- |"
            echo "| ![Main menu]($DL/01-main-menu.png) | ![Campaign]($DL/02-campaign.png) |"
            echo
            echo "![Gameplay]($DL/03-gameplay.png)"
            echo
            echo "## What's changed"
            echo
            git log --no-merges --pretty=format:'- %s' "$RANGE" | grep -v '^- chore(release):' || echo "- Initial release"
            echo
            echo
            if [ -n "$PREV" ]; then
              echo "**Full changelog:** https://github.com/$REPO/compare/$PREV...$TAG"
            fi
          } > notes.md

          echo "--- notes.md ---"; cat notes.md

      - name: Create the release and upload every asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          # Installers, update feeds (latest*.yml), blockmaps and screenshots.
          mapfile -t FILES < <(find artifacts -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \
               -o -name '*.blockmap' -o -name 'latest*.yml' -o -name '*.png' \) | sort)
          printf 'attaching:\n'; printf '  %s\n' "${FILES[@]}"
          gh release create "$TAG" \
            --title "Ghosts in the Machine $TAG" \
            --notes-file notes.md \
            --latest \
            "${FILES[@]}"
